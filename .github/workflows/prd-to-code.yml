    - name: Commit and Push Code
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name 'UltraWorker Agent'
        git config --global user.email 'actions@github.com'
        git add .
        
        # Check if there are actual changes to commit
        if ! git diff --quiet && git diff --staged --quiet; then
          git commit -m "[Auto-Commit] Agent generated code and architecture"
          
          # Pull latest remote updates via rebase to avoid non-fast-forward rejections
          git pull --rebase origin main
          
          # Push the combined history back to your repository
          git push origin main
        else
          echo "No changes detected. Skipping deployment."
        fi
        
